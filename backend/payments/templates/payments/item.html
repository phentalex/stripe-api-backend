<!DOCTYPE html>
<html>
<head>
    <title>{{ item.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h1 class="card-title mb-3">{{ item.name }}</h1>
                        <p class="card-text text-muted mb-4">{{ item.description }}</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fs-3 fw-bold">{{ item.price }} {{ item.currency|upper }}</span>
                            <button id="buy-button" class="btn btn-primary btn-lg">Buy Now</button>
                        </div>
                    </div>
                </div>
                <a href="/" class="btn btn-link mt-3">← Back to Shop</a>
            </div>
        </div>
    </div>

    <script>
        var stripe = Stripe('{{ stripe_public_key }}');
        document.getElementById('buy-button').addEventListener('click', function() {
            fetch('/buy/{{ item.id }}/')
                .then(response => response.json())
                .then(session => stripe.redirectToCheckout({ sessionId: session.id }))
        });
    </script>
</body>
</html>
